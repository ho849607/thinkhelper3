<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ThinkHelper</title>
<style>
:root{--bg:#131314;--sb:#1e1f22;--sf:#282a2d;--sfh:#3a3b40;--tm:#e3e3e3;--mt:#a0a0a0;--ac:#8ab4f8;--bc:#3c4043;--purple:#7c6af7;}
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif;}
body,html{margin:0;padding:0;height:100%;background:var(--bg);color:var(--tm);overflow-x:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}

/* ── 상단 헤더 (모바일 대응) ── */
.topbar{height:56px;background:var(--sb);border-bottom:1px solid var(--bc);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;justify-content:space-between;z-index:100;}
.brand{font-size:16px;font-weight:800;color:#fff;display:flex;align-items:center;gap:6px;}
.tabs{display:flex;gap:2px;}
.tab{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--mt);border:none;background:transparent;transition:all .15s;}
.tab.on{background:var(--sf);color:var(--ac);}
.topright{display:flex;align-items:center;gap:8px;}
.ua{width:28px;height:28px;border-radius:50%;background:var(--sf);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.ua img{width:100%;height:100%;object-fit:cover;}
.login-btn{padding:5px 10px;border-radius:8px;background:rgba(138,180,248,.1);border:1px solid rgba(138,180,248,.3);color:var(--ac);font-size:12px;font-weight:600;}

/* ── 바디 레이아웃 (반응형) ── */
.body{display:flex;flex:1;overflow:hidden;position:relative;}

/* ── 사이드바 (모바일에서는 서랍장 형태) ── */
.side{width:240px;background:var(--sb);border-right:1px solid var(--bc);display:flex;flex-direction:column;flex-shrink:0;transition:transform 0.3s ease;z-index:90;}
.side-head{padding:16px;font-size:12px;font-weight:700;color:var(--mt);border-bottom:1px solid var(--bc);display:flex;justify-content:space-between;align-items:center;}
.chat-list{flex:1;overflow-y:auto;padding:8px;}
.chat-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-item.on{background:var(--sf);color:var(--ac);}

/* ── 메인 콘텐츠 ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.vc{display:none;flex-direction:column;height:100%;overflow-y:auto;padding:20px;}
.vc.on{display:flex;}

/* ── 디스커버리 (모바일 최적화) ── */
.greet{font-size:20px;font-weight:600;margin:20px 0;text-align:center;line-height:1.4;}
.dsearch{width:100%;max-width:760px;background:var(--sf);border-radius:24px;padding:10px 16px;display:flex;align-items:center;gap:10px;border:1px solid var(--bc);margin:0 auto 16px;}
.dsearch input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:14px;}
.aibadge{background:var(--purple);color:#fff;padding:6px 12px;border-radius:18px;font-size:11px;font-weight:700;}

.chips{display:flex;overflow-x:auto;gap:8px;padding-bottom:12px;width:100%;-webkit-overflow-scrolling:touch;}
.chip{background:var(--sb);border:1px solid var(--bc);padding:7px 12px;border-radius:18px;font-size:12px;white-space:nowrap;flex-shrink:0;}

/* 뉴스 그리드 반응형 */
.ngrid{display:grid;grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));gap:12px;}
.ncard{background:var(--sb);border-radius:10px;overflow:hidden;border:1px solid var(--bc);}
.nimg{height:100px;background:var(--sf);}
.nc{padding:10px;}
.nt{font-size:12px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ── 채팅창 (모바일 대응) ── */
.cw{flex:1;display:flex;flex-direction:column;gap:16px;overflow-y:auto;padding:10px;}
.mr{display:flex;gap:10px;max-width:100%;}
.mc{max-width:85%;font-size:14px;padding:10px 14px;border-radius:14px;word-break:break-word;}
.mr.user{justify-content:flex-end;}
.mr.ai .mc{border:1px solid var(--bc);background:transparent;}
.mr.user .mc{background:var(--sf);}

/* 입력창 고정 */
.iac{padding:10px;background:var(--bg);border-top:1px solid var(--bc);}
.iw{background:var(--sf);border-radius:24px;padding:8px 14px;display:flex;align-items:flex-end;gap:10px;border:1px solid var(--bc);}
.ci{flex:1;border:none;outline:none;background:transparent;color:#fff;font-size:14px;max-height:100px;padding:6px 0;}

/* ── 모바일 전용 미디어 쿼리 ── */
@media (max-width: 768px) {
  .side {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    transform: translateX(-100%); /* 숨김 */
  }
  .side.open { transform: translateX(0); }
  .topbar { padding: 0 8px; }
  .brand { font-size: 14px; }
  .tab { padding: 6px 8px; font-size: 12px; }
  .ngrid { grid-template-columns: 1fr 1fr; } /* 뉴스 2열 */
  .pay-banner { flex-direction: column; text-align: center; }
}

/* 메뉴 버튼 (모바일 전용) */
#menuBtn { display: none; background: transparent; border: none; color: var(--mt); cursor: pointer; }
@media (max-width: 768px) { #menuBtn { display: block; } }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:4px;">
      <button id="menuBtn" onclick="toggleSide()">☰</button>
      <div class="brand">ThinkHelper</div>
      <div class="tabs">
        <button class="tab on" id="tabE" onclick="sv('e')">에디터</button>
        <button class="tab" id="tabD" onclick="sv('d')">디스커버리</button>
      </div>
    </div>
    <div class="topright" id="userArea">
      <button class="login-btn" onclick="doSignIn()">Google 로그인</button>
    </div>
  </div>

  <div class="body">
    <div class="side" id="sideBar">
      <div class="side-head"><span>💬 채팅 기록</span><div class="new-chat" onclick="newChat()">+</div></div>
      <div class="chat-list" id="chatList"></div>
    </div>

    <div class="main">
      <div class="vc" id="dv">
        <h1 class="greet" id="greeting">무엇이 궁금하신가요?</h1>
        <div class="dsearch">
          <input type="text" id="discInput" placeholder="검색어 입력..." onkeypress="if(event.key==='Enter')doDiscSearch(this.value)"/>
          <div class="aibadge" onclick="doDiscSearch(document.getElementById('discInput').value)">검색</div>
        </div>
        <div class="chips" id="chipContainer"></div>
        <div id="aiResult"></div>
        <div class="ngrid" id="newsGrid"></div>
      </div>

      <div class="vc on" id="ev">
        <div class="cw" id="cw"></div>
        <div class="iac">
          <div class="iw">
            <textarea id="ci" class="ci" placeholder="메시지 입력..." rows="1" oninput="autoHeight(this)"></textarea>
            <button class="sb2" onclick="send()" style="background:var(--ac); border:none; border-radius:50%; width:32px; height:32px; cursor:pointer;">↑</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// 🔐 [보안 패치] 노출된 API 키는 삭제하고, 구글 콘솔에서 '제한된' 새 키를 여기에 넣으세요!
const firebaseConfig = {
  apiKey: "YOUR_RESTRICTED_API_KEY_HERE", 
  authDomain: "thinkhelperv3.firebaseapp.com",
  projectId: "thinkhelperv3",
  storageBucket: "thinkhelperv3.firebasestorage.app",
  messagingSenderId: "437352311046",
  appId: "1:437352311046:web:ae868d361b092e913e1687"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app), pv = new GoogleAuthProvider();

onAuthStateChanged(auth, user => {
  window.curUser = user;
  const g = document.getElementById('greeting'), u = document.getElementById('userArea');
  if(user){
    g.textContent = user.displayName + "님, 환영합니다! 🌟";
    u.innerHTML = `<div class="ua"><img src="${user.photoURL}"></div><div class="uact" onclick="window.doSignOut()" style="font-size:10px; cursor:pointer;">로그아웃</div>`;
  } else {
    u.innerHTML = `<button class="login-btn" onclick="window.doSignIn()">Google 로그인</button>`;
  }
});

window.doSignIn = () => signInWithPopup(auth, pv).catch(e => alert('로그인 실패: ' + e.message));
window.doSignOut = () => signOut(auth);

// ── 핵심 기능 함수들 ──
window.sv = (v) => {
  document.getElementById('ev').classList.toggle('on', v==='e');
  document.getElementById('dv').classList.toggle('on', v==='d');
  document.getElementById('tabE').classList.toggle('on', v==='e');
  document.getElementById('tabD').classList.toggle('on', v==='d');
};
window.toggleSide = () => document.getElementById('sideBar').classList.toggle('open');
window.autoHeight = (el) => { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; };

// (기타 채팅/검색 로직은 기존과 동일하게 유지하거나 API 엔드포인트에 맞춰 연결하세요)
</script>
</body>
</html>
